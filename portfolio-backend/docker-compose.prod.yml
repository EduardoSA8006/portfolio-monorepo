services:
  postgres:
    image: postgres:16-alpine
    container_name: portfolio_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portfolio}
      POSTGRES_USER: ${POSTGRES_USER:-portfolio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portfolio_secret}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portfolio} -d ${POSTGRES_DB:-portfolio}"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"
    networks:
      - portfolio_net

  redis:
    image: redis:7-alpine
    container_name: portfolio_redis
    restart: unless-stopped
    # Session, Celery broker, and result backend share this instance via separate
    # logical DBs (0 / 1 / 2). For production, point CELERY_BROKER_URL and
    # CELERY_RESULT_BACKEND at a dedicated Redis instance with its own requirepass
    # so that a Celery compromise cannot reach auth:session:* keys.
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"
    networks:
      - portfolio_net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"
    networks:
      - portfolio_net

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio_celery
    restart: unless-stopped
    command: ["celery", "-A", "app.worker", "worker", "--loglevel=info", "--concurrency=4"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"
    networks:
      - portfolio_net

volumes:
  postgres_data:
  redis_data:

networks:
  portfolio_net:
    driver: bridge
