services:
  postgres:
    image: postgres:16-alpine
    container_name: portfolio_postgres
    restart: unless-stopped
    environment:
      # Fail-closed: if .env does not load, deploy aborts instead of silently
      # coming up with a predictable password. DB and USER use defaults because
      # they are not secrets; the password is.
      POSTGRES_DB: ${POSTGRES_DB:-portfolio}
      POSTGRES_USER: ${POSTGRES_USER:-portfolio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — refusing to start with a default}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portfolio} -d ${POSTGRES_DB:-portfolio}"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"
    networks:
      - data_net

  redis:
    image: redis:7-alpine
    container_name: portfolio_redis
    restart: unless-stopped
    # Sessions / rate-limit / MFA challenges live here. The Celery worker does
    # NOT have access to this instance — it uses redis_celery instead, on a
    # different Docker network, with a different requirepass. A compromised
    # Celery task therefore cannot scan or rewrite auth:session:* keys.
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required — refusing to start with a default}
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"
    networks:
      - sessions_net

  redis_celery:
    image: redis:7-alpine
    container_name: portfolio_redis_celery
    restart: unless-stopped
    # Dedicated broker + result backend for Celery. Isolated on celery_net so
    # the API container has no route to it.
    command: redis-server --appendonly yes --requirepass ${CELERY_REDIS_PASSWORD:?CELERY_REDIS_PASSWORD is required — refusing to start with a default}
    expose:
      - "6379"
    volumes:
      - redis_celery_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${CELERY_REDIS_PASSWORD:?CELERY_REDIS_PASSWORD is required}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256M"
    networks:
      - celery_net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio_api
    restart: unless-stopped
    # No `ports:` — the host never exposes 8000. Traefik (on the `edge`
    # network) is the only path from the internet to this container.
    expose:
      - "8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"
    # API talks to Postgres (data_net), sessions Redis (sessions_net), and
    # faces the internet through Traefik (edge). It has NO route to
    # redis_celery, by design.
    networks:
      - data_net
      - sessions_net
      - edge
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=edge"
      - "traefik.http.routers.portfolio-api.rule=Host(`api.eduardoalves.online`)"
      - "traefik.http.routers.portfolio-api.entrypoints=websecure"
      - "traefik.http.routers.portfolio-api.tls=true"
      - "traefik.http.routers.portfolio-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.portfolio-api.loadbalancer.server.port=8000"

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio_celery
    restart: unless-stopped
    command: ["celery", "-A", "app.worker", "worker", "--loglevel=info", "--concurrency=4"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis_celery:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"
    # Celery needs Postgres for reads/writes from tasks, plus its own Redis.
    # It has NO route to the sessions Redis — task poisoning cannot reach
    # auth:session:* keys across the Docker network boundary.
    networks:
      - data_net
      - celery_net

volumes:
  postgres_data:
  redis_data:
  redis_celery_data:

networks:
  # data_net: Postgres lives here. API and Celery both join to read/write
  # application data. DB is isolated from anything else.
  data_net:
    driver: bridge
  # sessions_net: API <-> Redis (sessions, CSRF, rate-limits, MFA).
  # Celery has no route here.
  sessions_net:
    driver: bridge
  # celery_net: Celery <-> redis_celery. API has no route here.
  celery_net:
    driver: bridge
  # `edge` is created externally (see scripts/create-edge-network.sh) so the
  # Traefik stack in /srv/traefik/ can share it. Subnet is pinned to
  # 172.28.0.0/16 — if you change it, update TRUSTED_PROXY_CIDRS in .env.
  edge:
    external: true
