# Production overrides — must be applied EXPLICITLY:
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# NEVER run `docker compose up` (or any other compose command) without the
# `-f` flags in production. Compose auto-loads docker-compose.override.yml
# from the working directory, and that file contains development settings:
#   - publishes 127.0.0.1:8000 / 127.0.0.1:3000 on the host
#   - read_only=false on api / celery
#   - APP_ENV=development, COOKIE_SECURE=false, COOKIE_SAMESITE=lax
#   - drops the external `edge` network (so Traefik can't reach the api)
# Loading the dev override in production silently breaks isolation, the
# Secure cookie flag, and the Traefik path. This file exists so that prod
# always takes the explicit `-f base -f prod` path and the dev override
# never gets a chance to apply.
services:
  postgres:
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis_celery:
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    # Defense in depth: reassert hardening here so a stale .env or an
    # accidental edit to the base file cannot silently weaken production.
    environment:
      APP_ENV: production
      COOKIE_SECURE: "true"
      COOKIE_SAMESITE: lax
      TRUST_PROXY_HEADERS: "true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  celery:
    environment:
      APP_ENV: production
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    # NEXT_PUBLIC_API_BASE_URL is enforced fail-closed by the base file's
    # build.args block — no need (or want) to duplicate the `:?` here, since
    # base interpolation runs first and would mask any prod-specific message.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
