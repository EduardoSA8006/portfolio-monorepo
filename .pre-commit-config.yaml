# Pre-commit hooks for the monorepo.
#
# Install once per checkout:
#   pip install pre-commit  (or: pipx install pre-commit)
#   pre-commit install
#
# Hooks here are deliberately fast — anything that takes >1s belongs in CI.
# The intent is to catch the easy mistakes (whitespace, secrets, lint) before
# they hit the remote.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: detect-private-key

  # Ruff lints the backend. Pinned to the same version range as
  # portfolio-backend/pyproject.toml's dev group so the local hook matches CI.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^portfolio-backend/.*\.py$
      - id: ruff-format
        files: ^portfolio-backend/.*\.py$

  # gitleaks catches accidentally-committed credentials. The .env files are
  # already gitignored, but a stray secret in code/comments still slips
  # through without a scanner.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
