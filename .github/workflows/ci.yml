name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch — saves CI minutes and gives
# faster feedback on the latest commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-lint-and-test:
    name: backend — ruff + pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portfolio-backend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Poetry
        run: pipx install "poetry>=2.0,<3.0"

      - name: Configure Poetry cache
        uses: actions/cache@v4
        with:
          path: portfolio-backend/.venv
          key: poetry-${{ runner.os }}-${{ hashFiles('portfolio-backend/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-root --with dev

      - name: Lint
        run: poetry run ruff check .

      - name: Format check
        run: poetry run ruff format --check .

      - name: Tests
        run: poetry run pytest

  python-vuln-scan:
    name: backend — pip-audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portfolio-backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Poetry + pip-audit
        run: |
          pipx install "poetry>=2.0,<3.0"
          pipx install pip-audit
      - name: Export resolved deps
        run: poetry export --without-hashes --without dev -f requirements.txt -o requirements.txt
      - name: Audit
        # --strict makes a known vulnerability fail the build. Use the
        # advisory-id ignore list (--ignore-vuln) for accepted-risk CVEs.
        run: pip-audit -r requirements.txt --strict

  gitleaks:
    name: secrets — gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  image-scan:
    name: image — trivy
    runs-on: ubuntu-latest
    needs: backend-lint-and-test
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5

      - name: Build backend image
        run: docker build -t portfolio-backend:ci portfolio-backend

      - name: Trivy scan (HIGH+CRITICAL, fail on findings)
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: portfolio-backend:ci
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
